name: Generate Languages Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        run: |
          curl -fsSL https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - name: Clone jstrieb/github-stats
        run: git clone --depth=1 https://github.com/jstrieb/github-stats.git _stats

      - name: Build github-stats
        working-directory: _stats
        run: zig build

      - name: Generate stats images
        working-directory: _stats
        env:
          ACCESS_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          EXCLUDE_PRIVATE: "false"
          SILENT: "true"
          MAX_RETRIES: "5"
        run: ./zig-out/bin/github-stats

      - name: Copy languages card to repo root
        run: |
          mkdir -p generated
          cp _stats/languages.svg generated/languages.svg

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/languages.svg
          git commit -m "chore: update languages card" || exit 0
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((RANDOM % 10 + 3))
          done
          exit 1
