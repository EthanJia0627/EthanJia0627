name: Generate Languages Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone jstrieb/github-stats
        run: git clone --depth=1 https://github.com/jstrieb/github-stats.git _stats

      - name: Install deps
        run: pip install -r _stats/requirements.txt

      - name: Generate stats images
        working-directory: _stats
        env:
          ACCESS_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: EthanJia0627
          EXCLUDE_FORKED_REPOS: "true"
        run: python generate_images.py

      - name: Copy languages card to repo root
        run: |
          mkdir -p generated
          cp _stats/generated/languages.svg generated/languages.svg

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/languages.svg
          git commit -m "chore: update languages card" || exit 0
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((RANDOM % 10 + 3))
          done
          exit 1
